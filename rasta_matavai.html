<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rasta Matavai - Darts</title>
    <style>
        /* =========================================
           Variables CSS (Thèmes et Couleurs)
           ========================================= */
        :root {
            /* Mode Sombre (Défaut) */
            --bg-color: #030202;
            --text-color: #F4F4F4;
            --accent-color: #A38E59;
            --panel-bg: rgba(244, 244, 244, 0.08); 
            --input-bg: rgba(244, 244, 244, 0.15);
            --border-color: rgba(244, 244, 244, 0.2);
            --active-panel-bg: rgba(163, 142, 89, 0.15);
        }

        [data-theme="light"] {
            /* Mode Clair */
            --bg-color: #F4F4F4;
            --text-color: #030202;
            --accent-color: #A38E59;
            --panel-bg: rgba(3, 2, 2, 0.05);
            --input-bg: rgba(3, 2, 2, 0.1);
            --border-color: rgba(3, 2, 2, 0.2);
            --active-panel-bg: rgba(163, 142, 89, 0.25);
        }

        /* =========================================
           Reset et Base
           ========================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Forcer le plein écran sans scroll global */
        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
            position: relative;
        }

        /* =========================================
           Arrière-plan Logo Fullscreen
           ========================================= */
        .bg-logo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Intégration du logo fourni avec la couleur or/bronze (%23A38E59) */
            background-image: url('data:image/svg+xml;utf8,<svg width="16.980463mm" height="21.079481mm" viewBox="0 0 16.980463 21.079481" version="1.1" xmlns="http://www.w3.org/2000/svg"><g transform="translate(-0.02544299,-0.06753615)"><path style="fill:%23A38E59" d="m 9.2584941,21.041775 c -0.331792,-0.331792 -0.222581,-2.234231 0.1341291,-2.336507 4.1413278,-1.187407 5.8753198,-3.266195 5.8002778,-6.953634 -0.04906,-2.4108518 -1.330234,-4.5908438 -3.317634,-5.6451568 -1.144452,-0.60713 -2.1688668,-0.569798 -1.9551838,0.07125 0.05964,0.178932 0.6727028,0.615709 1.3623518,0.970615 3.363614,1.730976 3.256493,7.2849128 -0.173318,8.9860398 -1.8993709,0.942056 -2.0472229,0.703497 -2.0472229,-3.303202 0,-3.2748947 0,-3.2748947 0.7408331,-3.2748947 1.4503858,0 1.7562018,0.9267767 0.7143748,2.1649177 -0.7616458,0.905166 -0.8497428,1.842332 -0.23132,2.460756 1.256693,1.256693 3.197317,-0.913277 2.89861,-3.241172 C 12.90953,8.7987322 11.880802,7.5705212 10.047454,7.1955622 9.2592221,7.0343512 9.1941861,6.9412102 9.1941861,5.9735632 c 0,-1.040662 0.0063,-1.047121 0.9736779,-0.991397 2.264347,0.130442 4.894633,2.114089 6.153817,4.6409401 1.842305,3.6970247 -0.20771,9.0879947 -4.091158,10.7586087 -1.572381,0.67642 -2.7042828,0.927805 -2.9720289,0.66006 z M 5.2054131,15.89708 c -5.49128505,-2.136634 -6.937353,-9.0222618 -2.780859,-13.2413918 1.465316,-1.487397 3.969927,-2.76725893 5.024479,-2.56751993 0.546739,0.103556 0.76074,2.27812093 0.23913,2.42991893 -4.144066,1.206003 -5.902625,3.266512 -5.893904,6.905907 0.0065,2.7138678 2.548049,6.2177078 4.510078,6.2177078 0.849231,0 0.88515,-0.948478 0.04558,-1.203504 -3.880792,-1.178819 -4.153816,-7.6979458 -0.392912,-9.3817528 1.859024,-0.83231 2.046558,-0.543313 2.046558,3.153836 0,3.5756448 -0.247215,4.1462178 -1.453884,3.3555778 -0.836627,-0.548179 -0.836959,-1.06473 -0.0013,-2.0578247 0.76542,-0.9096501 0.825007,-1.4525911 0.249581,-2.2741271 -0.87752,-1.252834 -2.546686,-0.29101 -2.916565,1.680613 -0.412372,2.1981298 1.255867,5.1310888 2.925705,5.1437338 0.912749,0.0069 1.241169,0.391491 1.149969,1.346611 -0.107324,1.124 -0.806476,1.249066 -2.751629,0.492215 z" /></g></svg>');
            background-size: contain; /* Ajusté pour ne pas rogner le logo */
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.14;
            z-index: -1;
            pointer-events: none;
        }

        /* =========================================
           Typographie et Composants
           ========================================= */
        h1, h2, h3, h4 {
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 15px;
        }

        .highlight-text {
            color: var(--accent-color);
            font-weight: bold;
        }

        button {
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 15px;
            font-size: clamp(1.2rem, 5vmin, 2rem);
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active {
            transform: scale(0.98);
        }

        button.primary {
            background-color: var(--accent-color);
            color: #030202;
            border-color: var(--accent-color);
        }

        button:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--accent-color);
            text-transform: uppercase;
            font-weight: bold;
        }

        /* =========================================
           Contrôles de type "Stepper" (+ / -)
           ========================================= */
        .stepper-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
            height: 60px;
        }

        .btn-stepper {
            width: 60px;
            height: 100%;
            background-color: transparent;
            border: none;
            color: var(--accent-color);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            border-radius: 0;
        }

        .btn-stepper:active {
            background-color: var(--active-panel-bg);
            transform: scale(0.95);
        }

        .btn-stepper.left {
            border-right: 2px solid var(--border-color);
        }

        .btn-stepper.right {
            border-left: 2px solid var(--border-color);
        }

        .stepper-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-color);
            text-align: center;
            flex: 1;
        }

        /* =========================================
           Layouts & Vues (Boutons Flottants)
           ========================================= */
        .theme-toggle-floating {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            padding: 0;
            transition: all 0.3s ease;
        }

        .wake-lock-indicator {
            right: 60px;
            display: none; /* Caché par défaut, activé par JS */
        }
        
        .fullscreen-toggle-floating {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            padding: 0;
            transition: all 0.3s ease;
        }

        .theme-toggle-floating:active, .fullscreen-toggle-floating:active {
            transform: scale(0.9);
            background-color: var(--active-panel-bg);
        }

        /* Par défaut (Mode Sombre), on affiche le soleil pour passer en mode clair */
        .icon-moon { display: none; }
        .icon-sun { display: block; }

        /* En Mode Clair, on affiche la lune pour passer en mode sombre */
        [data-theme="light"] .icon-moon { display: block; }
        [data-theme="light"] .icon-sun { display: none; }
        
        /* Icônes Plein écran */
        .icon-wake-lock { color: var(--accent-color); opacity: 0.3; }
        .icon-wake-lock.active { opacity: 1; filter: drop-shadow(0 0 5px var(--accent-color)); }

        .icon-compress { display: none; }
        .icon-expand { display: block; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 5px;
            padding-top: 55px; /* Évite l'overlap avec les boutons flottants */
            max-width: 1200px; 
            margin: 0 auto;
            width: 100%;
            min-height: 0; /* Autorise les enfants flex à rapetisser */
        }

        .view {
            display: none;
            flex-direction: column;
            gap: 10px;
            animation: fadeIn 0.3s ease-in-out;
            flex: 1; 
            min-height: 0;
            overflow-y: auto; /* Scroll uniquement sur Setup et Fin */
        }

        #gameView {
            overflow: hidden; /* Strictement pas de scroll pendant le jeu */
            gap: 5px;
        }

        .view.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================
           Layout Dynamique (Portrait / Paysage)
           ========================================= */
        .game-display {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0; /* Permet le rétrécissement compressé */
        }

        .game-controls {
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            padding-top: 5px;
            flex: 0 0 auto; /* Prend uniquement la place nécessaire */
        }

        @media (orientation: landscape) and (min-width: 600px) {
            #gameView.active {
                flex-direction: row;
                align-items: stretch;
            }
            .game-display {
                flex: 2;
                padding-right: 15px;
                overflow-y: hidden;
            }
            .game-controls {
                flex: 1;
                justify-content: center;
                align-items: center;
                border-left: 2px solid var(--border-color);
                padding-left: 15px;
                padding-top: 0;
                min-width: 280px; 
            }
        }

        /* =========================================
           Vue Jeu : Grilles et HUD
           ========================================= */
        .game-hud {
            text-align: center;
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            padding: clamp(5px, 1.5vh, 15px);
            border-radius: 4px;
            margin-bottom: 5px;
            flex: 1.2; 
            min-height: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .game-hud h3 {
            font-size: clamp(1.2rem, 4vmin, 2rem);
            margin: 0 0 clamp(2px, 1vh, 10px) 0;
            color: var(--text-color);
        }

        .active-target-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(10px, 4vmin, 30px);
            width: 100%;
            flex: 1; 
            min-height: 0;
        }

        .target-box {
            background-color: var(--active-panel-bg);
            border: 3px solid var(--accent-color);
            border-radius: 8px;
            padding: clamp(2px, 1vmin, 5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            height: 100%;
            max-width: 250px;
            aspect-ratio: 1;
            box-shadow: 0 4px 15px rgba(163, 142, 89, 0.2);
        }

        .target-label {
            font-size: clamp(0.8rem, 3vmin, 1.5rem);
            color: var(--text-color);
            opacity: 0.8;
            margin-bottom: 2px;
            font-weight: bold;
        }

        .target-value {
            font-size: clamp(3rem, 15vmin, 8rem);
            font-weight: bold;
            color: var(--accent-color);
            line-height: 0.9;
        }

        .darts-indicator {
            display: flex;
            gap: clamp(6px, 2vmin, 15px);
            flex: 1;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .dart-slot {
            flex: 1;
            aspect-ratio: 1;
            max-width: 100px;
            max-height: 100px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: clamp(1.5rem, 6vmin, 3.5rem);
            transition: all 0.3s ease;
        }

        .dart-slot.empty {
            border: 2px dashed var(--border-color);
            background: transparent;
        }

        .dart-slot.hit {
            border: 2px solid var(--accent-color);
            background: var(--accent-color);
            color: #030202;
            box-shadow: 0 0 10px rgba(163, 142, 89, 0.4);
        }

        .dart-slot.miss {
            border: 2px solid var(--border-color);
            background: rgba(244, 244, 244, 0.1);
            color: var(--text-color);
        }

        .players-grid {
            display: grid;
            gap: 5px;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            margin-bottom: 0;
            padding: 2px; 
            flex: 1; 
            min-height: 0;
            overflow-y: auto; /* Ne s'activera que si 6 joueurs sur un écran minuscule */
        }

        .player-card {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            padding: clamp(5px, 1.5vh, 10px);
            text-align: center;
            border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            
            opacity: 0.35;
            filter: grayscale(80%);
            transform: scale(0.95);
        }

        .player-card.active-turn {
            opacity: 1;
            filter: grayscale(0%);
            border-color: var(--accent-color);
            border-width: 3px;
            background-color: var(--active-panel-bg);
            transform: scale(1.02); 
            box-shadow: 0 4px 10px rgba(163, 142, 89, 0.3);
            z-index: 10;
        }

        .player-name {
            font-size: clamp(0.9rem, 3.5vmin, 1.2rem);
            color: var(--accent-color);
            margin-bottom: 2px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-score {
            font-size: clamp(2rem, 9vmin, 4.5rem); 
            font-weight: bold;
            line-height: 1;
            margin: clamp(2px, 1vh, 5px) 0;
        }

        .player-legs {
            font-size: clamp(0.7rem, 2vmin, 1rem);
            opacity: 0.8;
            margin-top: auto; 
        }

        /* Pad de Score */
        .scoring-pad {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(5px, 1.5vw, 10px);
            width: 100%;
            max-width: 500px;
        }

        .btn-score {
            background-color: rgba(163, 142, 89, 0.1);
            border-color: var(--accent-color);
            color: var(--text-color);
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            /* Suppression du ratio forcé pour éviter que les boutons ne soient trop hauts sur mobile */
            height: clamp(60px, 12vh, 100px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            text-align: center;
            line-height: 1.1;
            word-wrap: break-word;
        }

        @media (orientation: landscape) and (min-width: 600px) {
            .btn-score {
                height: clamp(40px, 15vh, 90px);
                font-size: clamp(1rem, 3.5vw, 2rem);
            }
        }
        
        .btn-score.miss {
            background-color: transparent;
            color: var(--text-color);
            border-color: var(--border-color);
        }

        .btn-score.action {
            background-color: var(--panel-bg);
            border-color: var(--border-color);
            color: var(--text-color);
            flex-direction: column;
            gap: 4px;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
        }

        .btn-score.action svg {
            width: clamp(20px, 5vw, 28px);
            height: clamp(20px, 5vw, 28px);
        }

        /* =========================================
           Vue Fin de Manche
           ========================================= */
        .stats-grid {
            display: grid;
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .stat-card span { display: block; }
        .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--accent-color); margin-top: 5px;}

        /* =========================================
           Modal (Popup de Confirmation)
           ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(3, 2, 2, 0.85); /* Fond sombre transparent */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--bg-color);
            border: 2px solid var(--accent-color);
            padding: clamp(20px, 5vw, 30px);
            border-radius: 8px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-content h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .modal-content p {
            font-size: 1.1rem;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

    </style>
</head>
<body>

    <!-- Arrière-plan Logo -->
    <div class="bg-logo"></div>
    
    <!-- Bouton Flottant Plein Écran -->
    <button id="fullscreenToggleBtn" class="fullscreen-toggle-floating" aria-label="Passer en plein écran">
        <!-- Icône Agrandir -->
        <svg class="icon-expand" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
        </svg>
        <!-- Icône Réduire -->
        <svg class="icon-compress" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path>
        </svg>
    </button>

    <!-- Indicateur Anti-veille -->
    <div id="wakeLockIndicator" class="theme-toggle-floating wake-lock-indicator" title="Maintien de l'écran activé">
        <svg class="icon-wake-lock" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"></path>
            <circle cx="12" cy="12" r="4"></circle>
        </svg>
    </div>

    <!-- Bouton Flottant Thème -->
    <button id="themeToggleBtn" class="theme-toggle-floating" aria-label="Changer de thème">
        <!-- Icône Lune (affichée en mode clair) -->
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <!-- Icône Soleil (affichée en mode sombre) -->
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
    </button>

    <main>
        <!-- ==========================================
             VUE 1 : CONFIGURATION (SETUP)
             ========================================== -->
        <section id="setupView" class="view active">
            <h1>Rasta Matavai</h1>
            
            <div>
                <label>Nombre de joueurs</label>
                <div class="stepper-control">
                    <button class="btn-stepper left" onclick="updateStepper('playerCount', -1, 1, 6)">&lt;</button>
                    <span class="stepper-value" id="playerCountVal">2</span>
                    <button class="btn-stepper right" onclick="updateStepper('playerCount', 1, 1, 6)">&gt;</button>
                </div>
            </div>

            <div>
                <label>Manches Gagnantes</label>
                <div class="stepper-control">
                    <button class="btn-stepper left" onclick="updateStepper('legsToWin', -1, 1, 10)">&lt;</button>
                    <span class="stepper-value" id="legsToWinVal">2</span>
                    <button class="btn-stepper right" onclick="updateStepper('legsToWin', 1, 1, 10)">&gt;</button>
                </div>
            </div>

            <div id="playerNamesContainer">
                <!-- Inputs générés par JS -->
            </div>

            <button id="startGameBtn" class="primary" style="margin-top: 10px;">Démarrer la partie</button>
        </section>

        <!-- ==========================================
             VUE 2 : JEU (GAME)
             ========================================== -->
        <section id="gameView" class="view">
            <div class="game-display">
                <div class="game-hud">
                    <h3>Au tour de : <span id="turnDisplay" class="highlight-text">--</span></h3>
                    
                    <div class="active-target-area">
                        <div class="target-box">
                            <span class="target-label" id="targetLabel">CIBLE</span>
                            <span class="target-value" id="targetValue">--</span>
                        </div>
                        <div class="darts-indicator" id="dartsIndicator">
                            <!-- Généré par JS -->
                        </div>
                    </div>

                    <p id="matchStatusDisplay" style="font-size: 0.75rem; margin-top:2px; opacity: 0.8;"></p>
                </div>

                <div id="scoresContainer" class="players-grid"></div>
            </div>

            <div class="game-controls">
                <div class="scoring-pad">
                    <button class="btn-score" onclick="registerThrow(1)">Simple</button>
                    <button class="btn-score" onclick="registerThrow(2)">Double</button>
                    <button class="btn-score" id="btnTriple" onclick="registerThrow(3)">Triple</button>
                    <button class="btn-score miss" onclick="registerThrow(0)">Raté (X)</button>
                    
                    <!-- Bouton Quitter -->
                    <button class="btn-score action" onclick="requestQuit()">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        <span>Quitter</span>
                    </button>
                    
                    <!-- Bouton Annuler -->
                    <button class="btn-score action" id="undoBtn" onclick="undoAction()">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
                        </svg>
                        <span>Annuler</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- ==========================================
             VUE 3 : FIN DE MANCHE/PARTIE
             ========================================== -->
        <section id="endView" class="view">
            <h1 id="endTitle">Fin de la Manche</h1>
            <h2 id="winnerName" class="highlight-text" style="font-size: 2rem;">--</h2>
            
            <h3 style="margin-top: 20px;">Statistiques</h3>
            <div id="statsContainer" class="stats-grid">
                <!-- Stats générées par JS -->
            </div>

            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
                <button id="nextLegBtn" class="primary" onclick="startNextLeg()">Manche Suivante</button>
                <button onclick="undoAction()">Oups, Annuler la dernière fléchette</button>
                <button onclick="requestQuit()" style="background-color: transparent; border-color: transparent; font-size: 0.9rem;">Quitter / Nouvelle Partie</button>
            </div>
        </section>

        <!-- ==========================================
             POPUP QUITTER (MODAL)
             ========================================== -->
        <div id="quitModal" class="modal-overlay">
            <div class="modal-content">
                <h2 class="highlight-text">Quitter ?</h2>
                <p>La partie en cours sera perdue.<br>Êtes-vous sûr ?</p>
                <div class="modal-actions">
                    <button class="primary" onclick="confirmQuit()">Oui, Quitter</button>
                    <button onclick="cancelQuit()">Non, Continuer</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        /* =========================================
           État de l'Application (State)
           ========================================= */
        const state = {
            theme: 'dark',
            wakeLock: null,
            history: [], // Pile d'historique des états de jeu
            isTransitioning: false, // Verrouille l'UI pendant l'animation de changement de joueur
            
            // État du jeu courant
            game: {
                status: 'setup', // 'setup', 'playing', 'endLeg', 'endMatch'
                settings: {
                    legsToWin: 1
                },
                players: [], // { id, name, score, legsWon, throwsThisLeg: [] }
                currentRound: 0, // 0 à 6 (car 7 volées de 3 fléchettes = 21 fléchettes)
                currentPlayerIndex: 0,
                dartInRound: 0, // 0 à 2 (fléchette 1, 2 ou 3)
                currentTurnThrows: [], // Stocke les multiplicateurs des fléchettes du tour en cours
                legWinnerId: null,
                matchWinnerId: null
            }
        };

        /* =========================================
           Éléments du DOM
           ========================================= */
        const DOM = {
            themeToggleBtn: document.getElementById('themeToggleBtn'),
            fullscreenToggleBtn: document.getElementById('fullscreenToggleBtn'),
            wakeLockIndicator: document.getElementById('wakeLockIndicator'),
            setupView: document.getElementById('setupView'),
            gameView: document.getElementById('gameView'),
            endView: document.getElementById('endView'),
            quitModal: document.getElementById('quitModal'),
            
            playerCountVal: document.getElementById('playerCountVal'),
            legsToWinVal: document.getElementById('legsToWinVal'),
            playerNamesContainer: document.getElementById('playerNamesContainer'),
            startGameBtn: document.getElementById('startGameBtn'),
            
            targetDisplay: document.getElementById('targetDisplay'),
            turnDisplay: document.getElementById('turnDisplay'),
            matchStatusDisplay: document.getElementById('matchStatusDisplay'),
            scoresContainer: document.getElementById('scoresContainer'),
            btnTriple: document.getElementById('btnTriple'),
            undoBtn: document.getElementById('undoBtn'),
            
            endTitle: document.getElementById('endTitle'),
            winnerName: document.getElementById('winnerName'),
            statsContainer: document.getElementById('statsContainer'),
            nextLegBtn: document.getElementById('nextLegBtn')
        };

        /* =========================================
           Initialisation
           ========================================= */
        function init() {
            document.body.setAttribute('data-theme', state.theme);
            renderNameInputs();

            DOM.themeToggleBtn.addEventListener('click', toggleTheme);
            DOM.fullscreenToggleBtn.addEventListener('click', toggleFullscreen);
            DOM.startGameBtn.addEventListener('click', startGame);
            
            // Écouteurs pour mettre à jour l'icône plein écran de manière fiable
            document.addEventListener('fullscreenchange', updateFullscreenIcons);
            document.addEventListener('webkitfullscreenchange', updateFullscreenIcons);
            document.addEventListener('mozfullscreenchange', updateFullscreenIcons);
            document.addEventListener('MSFullscreenChange', updateFullscreenIcons);

            // Gestion du Wake Lock
            if ('wakeLock' in navigator) {
                DOM.wakeLockIndicator.style.display = 'flex';
                requestWakeLock();
                document.addEventListener('visibilitychange', handleVisibilityChange);
            }
            
            updateDisplay(); // Gère l'affichage basé sur state.game.status
        }

        async function requestWakeLock() {
            try {
                state.wakeLock = await navigator.wakeLock.request('screen');
                const icon = DOM.wakeLockIndicator.querySelector('.icon-wake-lock');
                icon.classList.add('active');

                state.wakeLock.addEventListener('release', () => {
                    icon.classList.remove('active');
                });
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        }

        function handleVisibilityChange() {
            if (state.wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        }

        /* =========================================
           Gestion du Thème & Plein Écran
           ========================================= */
        function toggleTheme() {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', state.theme);
            // Le changement d'icône est géré automatiquement par le CSS
        }
        
        function toggleFullscreen() {
            const doc = window.document;
            const docEl = doc.documentElement;

            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                if (requestFullScreen) {
                    requestFullScreen.call(docEl);
                }
            } else {
                if (cancelFullScreen) {
                    cancelFullScreen.call(doc);
                }
            }
        }
        
        function updateFullscreenIcons() {
            const isFullscreen = document.fullscreenElement || document.mozFullScreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
            const expandIcon = document.querySelector('.icon-expand');
            const compressIcon = document.querySelector('.icon-compress');
            
            if (isFullscreen) {
                expandIcon.style.display = 'none';
                compressIcon.style.display = 'block';
            } else {
                expandIcon.style.display = 'block';
                compressIcon.style.display = 'none';
            }
        }

        /* =========================================
           Logique de Configuration
           ========================================= */
        function updateStepper(id, delta, min, max) {
            const valEl = document.getElementById(id + 'Val');
            let currentVal = parseInt(valEl.textContent);
            let newVal = currentVal + delta;
            
            if (newVal >= min && newVal <= max) {
                valEl.textContent = newVal;
                // Si on met à jour le nombre de joueurs, on régénère les champs de texte
                if (id === 'playerCount') {
                    renderNameInputs();
                }
            }
        }

        function renderNameInputs() {
            let count = parseInt(DOM.playerCountVal.textContent) || 1;
            if (count < 1) count = 1; if (count > 6) count = 6;

            DOM.playerNamesContainer.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                const div = document.createElement('div');
                div.innerHTML = `
                    <label for="player${i}">Nom Joueur ${i}</label>
                    <input type="text" id="player${i}" value="Joueur ${i}">
                `;
                DOM.playerNamesContainer.appendChild(div);
            }
        }

        function startGame() {
            const count = parseInt(DOM.playerCountVal.textContent) || 1;
            const legs = parseInt(DOM.legsToWinVal.textContent) || 1;
            
            state.history = [];
            state.isTransitioning = false;
            state.game.status = 'playing';
            state.game.settings.legsToWin = legs;
            state.game.players = [];
            state.game.currentRound = 0;
            state.game.currentPlayerIndex = 0;
            state.game.dartInRound = 0;
            state.game.currentTurnThrows = [];
            state.game.legWinnerId = null;
            state.game.matchWinnerId = null;

            for (let i = 1; i <= count; i++) {
                const nameInput = document.getElementById(`player${i}`);
                state.game.players.push({
                    id: i,
                    name: nameInput.value.trim() || `Joueur ${i}`,
                    score: 0,
                    legsWon: 0,
                    throwsThisLeg: [] // Pour calculer les stats (Points Par Volée)
                });
            }

            saveStateToHistory();
            updateDisplay();
        }

        function startNextLeg() {
            state.isTransitioning = false;
            state.game.status = 'playing';
            state.game.currentRound = 0;
            state.game.currentPlayerIndex = 0;
            state.game.dartInRound = 0;
            state.game.currentTurnThrows = [];
            state.game.legWinnerId = null;
            
            // Remise à zéro des scores de la manche pour tous
            state.game.players.forEach(p => {
                p.score = 0;
                p.throwsThisLeg = [];
            });

            saveStateToHistory();
            updateDisplay();
        }

        /* =========================================
           Gestion du bouton Quitter / Modal
           ========================================= */
        function requestQuit() {
            DOM.quitModal.classList.add('active');
        }

        function cancelQuit() {
            DOM.quitModal.classList.remove('active');
        }

        function confirmQuit() {
            DOM.quitModal.classList.remove('active');
            resetGame();
        }

        function resetGame() {
            state.game.status = 'setup';
            state.history = [];
            updateDisplay();
        }

        /* =========================================
           Logique de Jeu (RASTA MATAVAI)
           ========================================= */
        function getTargetNumber() {
            // Rasta Matavai : on tire cible 1, 2, 3... jusqu'à 21 (Bulle)
            // Calcul mathématique simple basé sur le round (volée) et la fléchette actuelle
            return (state.game.currentRound * 3) + state.game.dartInRound + 1;
        }

        function registerThrow(multiplier) {
            if (state.isTransitioning) return; // Bloquer les clics multiples pendant la transition

            saveStateToHistory();

            state.game.currentTurnThrows.push(multiplier);

            const currentPlayer = state.game.players[state.game.currentPlayerIndex];
            const target = getTargetNumber();
            let pointsEarned = 0;

            if (multiplier > 0) {
                if (target === 21) {
                    // Bulle : Simple = 25, Double = 50 (Triple impossible)
                    pointsEarned = multiplier === 1 ? 25 : (multiplier === 2 ? 50 : 0);
                } else {
                    pointsEarned = target * multiplier;
                }
            }

            currentPlayer.score += pointsEarned;
            currentPlayer.throwsThisLeg.push(multiplier); // On enregistre le hit (1, 2, 3 ou 0) pour le calcul du MPR

            state.game.dartInRound++;
            
            if (state.game.dartInRound >= 3) {
                // Afficher la 3ème fléchette avant de changer de joueur
                updateDisplay();
                state.isTransitioning = true;
                
                setTimeout(() => {
                    advanceTurnLogic();
                    state.isTransitioning = false;
                    updateDisplay();
                }, 800); // 800ms de délai pour visualiser la dernière flèche
            } else {
                updateDisplay();
            }
        }

        function advanceTurnLogic() {
            state.game.dartInRound = 0;
            state.game.currentPlayerIndex++;
            state.game.currentTurnThrows = []; // Réinitialiser pour le joueur suivant
            
            // Tout le monde a joué la volée
            if (state.game.currentPlayerIndex >= state.game.players.length) {
                state.game.currentPlayerIndex = 0;
                state.game.currentRound++;
                
                // Fin de la manche (7 volées complètes = 21 fléchettes jouées par tous)
                if (state.game.currentRound >= 7) {
                    handleLegEnd();
                }
            }
        }

        function handleLegEnd() {
            // Trouver le score max
            const maxScore = Math.max(...state.game.players.map(p => p.score));
            // Trouver le(s) joueur(s) ayant ce score
            const winners = state.game.players.filter(p => p.score === maxScore);
            
            // On attribue une manche à tous ceux qui sont à égalité
            winners.forEach(w => w.legsWon++);
            
            state.game.legWinnerId = winners.map(w => w.name).join(' & ');

            // Vérifier si un joueur a gagné le match
            const matchWinners = state.game.players.filter(p => p.legsWon >= state.game.settings.legsToWin);
            
            if (matchWinners.length > 0) {
                state.game.status = 'endMatch';
                state.game.matchWinnerId = matchWinners.map(w => w.name).join(' & ');
            } else {
                state.game.status = 'endLeg';
            }
        }

        /* =========================================
           Gestion de l'Historique (Undo)
           ========================================= */
        function saveStateToHistory() {
            // Copie profonde de l'état de jeu uniquement
            const gameStateCopy = JSON.parse(JSON.stringify(state.game));
            state.history.push(gameStateCopy);
        }

        function undoAction() {
            if (state.history.length > 0 && !state.isTransitioning) {
                // Récupère le dernier état sauvegardé
                const previousGameState = state.history.pop();
                state.game = previousGameState;
                updateDisplay();
            }
        }

        /* =========================================
           Affichage (Render)
           ========================================= */
        function updateDisplay() {
            // Gestion de l'affichage des vues
            DOM.setupView.classList.remove('active');
            DOM.gameView.classList.remove('active');
            DOM.endView.classList.remove('active');

            if (state.game.status === 'setup') {
                DOM.setupView.classList.add('active');
            } 
            else if (state.game.status === 'playing') {
                DOM.gameView.classList.add('active');
                renderGameHUD();
                renderPlayersGrid();
                
                // État des boutons de score (désactivés pendant la transition)
                const scoreBtns = document.querySelectorAll('.btn-score');
                scoreBtns.forEach(btn => {
                    btn.disabled = state.isTransitioning || (btn.id === 'btnTriple' && getTargetNumber() === 21);
                });

                // État du bouton Undo
                DOM.undoBtn.disabled = state.history.length === 0 || state.isTransitioning;
                DOM.undoBtn.style.opacity = (state.history.length === 0 || state.isTransitioning) ? '0.5' : '1';
            } 
            else if (state.game.status === 'endLeg' || state.game.status === 'endMatch') {
                DOM.endView.classList.add('active');
                renderEndScreen();
            }
        }

        function renderGameHUD() {
            const target = getTargetNumber();
            const currentPlayer = state.game.players[state.game.currentPlayerIndex];
            
            const targetValueEl = document.getElementById('targetValue');
            const targetLabelEl = document.getElementById('targetLabel');
            const dartsIndicatorEl = document.getElementById('dartsIndicator');

            // Affichage Cible
            if (target === 21) {
                targetValueEl.textContent = "B";
                targetLabelEl.textContent = "BULLE";
            } else {
                targetValueEl.textContent = target;
                targetLabelEl.textContent = "CIBLE";
            }

            // Affichage des Fléchettes (3 cases)
            dartsIndicatorEl.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const slot = document.createElement('div');
                slot.className = 'dart-slot';
                
                if (i < state.game.currentTurnThrows.length) {
                    const throwVal = state.game.currentTurnThrows[i];
                    if (throwVal === 0) {
                        slot.classList.add('miss');
                        slot.textContent = 'X';
                    } else {
                        slot.classList.add('hit');
                        slot.textContent = throwVal === 1 ? 'S' : (throwVal === 2 ? 'D' : 'T');
                    }
                } else {
                    slot.classList.add('empty');
                }
                
                dartsIndicatorEl.appendChild(slot);
            }

            // Affichage Tour
            DOM.turnDisplay.textContent = currentPlayer.name;
            DOM.matchStatusDisplay.textContent = `Manche vers ${state.game.settings.legsToWin}`;
        }

        function renderPlayersGrid() {
            DOM.scoresContainer.innerHTML = '';
            
            state.game.players.forEach((player, index) => {
                const isActive = index === state.game.currentPlayerIndex;
                const card = document.createElement('div');
                card.className = `player-card ${isActive ? 'active-turn' : ''}`;
                
                card.innerHTML = `
                    <div class="player-name">${player.name}</div>
                    <div class="player-score">${player.score}</div>
                    <div class="player-legs">Manches : ${player.legsWon}</div>
                `;
                DOM.scoresContainer.appendChild(card);
            });
        }

        function renderEndScreen() {
            const isMatchOver = state.game.status === 'endMatch';
            
            DOM.endTitle.textContent = isMatchOver ? "FIN DU MATCH" : "FIN DE LA MANCHE";
            DOM.winnerName.textContent = isMatchOver ? state.game.matchWinnerId : state.game.legWinnerId;
            
            DOM.nextLegBtn.style.display = isMatchOver ? 'none' : 'block';

            DOM.statsContainer.innerHTML = '';
            
            state.game.players.forEach(player => {
                // Calcul MPR basé sur les "Hits" (Marks Per Round)
                // Somme des multiplicateurs (1 pour simple, 2 pour double, 3 pour triple) divisée par le nombre de volées (7)
                const totalMarks = player.throwsThisLeg.reduce((sum, hit) => sum + hit, 0);
                const mpr = (totalMarks / 7).toFixed(2);
                
                const statCard = document.createElement('div');
                statCard.className = 'stat-card';
                statCard.innerHTML = `
                    <span>${player.name}</span>
                    <span class="stat-val">${player.score} pts</span>
                    <span style="font-size: 0.9rem; margin-top:5px; color: var(--accent-color); font-weight: bold;">MPR: ${mpr} Marks/volée</span>
                    ${isMatchOver ? `<span style="font-weight:bold; font-size: 0.9rem; margin-top:5px;">Manches: ${player.legsWon}</span>` : ''}
                `;
                DOM.statsContainer.appendChild(statCard);
            });
        }

        // Lancement
        init();

    </script>
</body>
</html>
